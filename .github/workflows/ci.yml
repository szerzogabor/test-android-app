name: CI

on:
  push:
    branches: [main]

permissions:
  contents: write # release creation + committing the keystore need it

env:
  # versionCode must be monotonically increasing across main builds;
  # github.run_number does exactly that per workflow.
  VERSION_CODE: ${{ github.run_number }}
  VERSION_NAME: 1.0.${{ github.run_number }}

jobs:
  android:
    name: Build & release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      # Generate this project's OWN persistent debug keystore on the
      # first run and commit it, so every later build signs with the
      # same key and installs can update in place. Never reuse another
      # project's keystore.
      - name: Ensure signing keystore
        run: |
          if [ ! -f keystore/app-debug.keystore ]; then
            mkdir -p keystore
            keytool -genkeypair -v \
              -keystore keystore/app-debug.keystore \
              -alias appdebug -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android App Debug, OU=CI, O=EmberForge, C=US"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -f keystore/app-debug.keystore
            git commit -m "Add persistent debug keystore for CI signing"
            git push
          fi

      - name: Build release APK
        env:
          APP_VERSION_CODE: ${{ env.VERSION_CODE }}
          APP_VERSION_NAME: ${{ env.VERSION_NAME }}
        run: gradle assembleRelease --no-daemon

      - name: Collect APK and metadata
        id: apk
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          OUT=app-${VERSION_NAME}.apk
          cp "$APK" "$OUT"
          SIZE=$(stat -c%s "$OUT")
          # metadata.json is the update contract read by the EmberForge
          # "Releases" tab: a slim { versionCode, versionName,
          # downloadUrl, sizeBytes }.
          jq -n \
            --argjson versionCode "$VERSION_CODE" \
            --arg versionName "$VERSION_NAME" \
            --arg downloadUrl "https://github.com/${{ github.repository }}/releases/download/v${VERSION_NAME}/${OUT}" \
            --argjson sizeBytes "$SIZE" \
            '{versionCode: $versionCode, versionName: $versionName, downloadUrl: $downloadUrl, sizeBytes: $sizeBytes}' \
            > metadata.json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${VERSION_NAME}" \
            "app-${VERSION_NAME}.apk" \
            metadata.json \
            --title "v${VERSION_NAME}" \
            --notes "Automated build from main (run #${VERSION_CODE})."
